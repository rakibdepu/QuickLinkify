<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuickLinkify Engine</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- NATIVE LIVE MONETAG SDK TAG -->
  <script src="https://libtl.com/sdk.js" data-zone="11216586" data-sdk="show_11216586"></script>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background-color: var(--tg-theme-bg-color, #f5f7fb); color: var(--tg-theme-text-color, #333333); padding: 25px 15px; margin: 0; }
    .card { background: var(--tg-theme-secondary-bg-color, #ffffff); max-width: 400px; margin: 0 auto; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
    .btn { display: inline-block; width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; font-weight: bold; border: none; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background-color: var(--tg-theme-button-color, #0088cc); color: var(--tg-theme-button-text-color, #ffffff); }
    .btn-wa { background-color: #25D366; color: white; }
    .btn-tg { background-color: #26A5E4; color: white; }
    .btn-signal { background-color: #3A76F0; color: white; }
    .input-field { width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; text-align: center; background: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #333); outline: none; }
    .hidden { display: none !important; }
    .description-text { color: #666666; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
    
    .btn-row { display: flex; align-items: center; gap: 8px; margin-top: 15px; }
    .btn-row .btn { margin-top: 0; flex-grow: 1; }
    .btn-copy { background: var(--tg-theme-bg-color, #eeeeee); color: var(--tg-theme-text-color, #333333); border: 1px solid #ccc; border-radius: 8px; height: 48px; width: 48px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-sizing: border-box; flex-shrink: 0; transition: background 0.2s; }
    .btn-copy:active { background: #ddd; }
  </style>
</head>
<body>
  <div class="card">
    <h3 id="flow-title">QuickLinkify</h3>
    <p class="description-text" id="flow-desc">Connecting to database...</p>
    
    <!-- PAGE 1: SIGNUP / VERIFICATION -->
    <div id="view-verify" class="hidden">
      <input type="tel" id="user-phone" class="input-field" placeholder="Your Phone Number">
      <button class="btn btn-primary" id="verify-btn" onclick="executeVerification()" disabled>Verify Account</button>
    </div>

    <!-- PAGE 2: MAIN APP (LINKIFY) -->
    <div id="view-main-form" class="hidden">
      <input type="tel" id="target-phone" class="input-field" placeholder="Target Number to Linkify">
      <button class="btn btn-primary" id="action-btn" onclick="executeLinkifySubmission()" disabled>Generate Links</button>
    </div>
    
    <!-- PAGE 3: RESULTS -->
    <div id="view-results" class="hidden">
      <div id="links-container"></div>
    </div>
  </div>
  
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const sdkFunctionName = "show_11216586";
    let fallbackVerifiedPhone = "";
    
    // Extract referral code
    const urlParams = new URLSearchParams(window.location.search);
    const refParam = urlParams.get('ref') || 'organic';
    
    // ⚠️ CONFIGURATION: Paste your Google Apps Script Web App Executable URL here!
    const GOOGLE_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbwh8ZEuboFIt56bue7ShUEZBxmkBLMgoqBioZJ2tMtPIcfZYKhbUgUUQlGgdsCKvoVP2Q/exec";
    
    // Format User Info
    const userObj = tg.initDataUnsafe.user;
    const tgUserId = userObj ? userObj.id : "";
    const displayName = userObj ? "[" + userObj.id + "] " + (userObj.first_name || "") + " " + (userObj.last_name || "") + " (@" + (userObj.username || "") + ")" : "Unknown App User";

    // --- Validation Logic ---
    function validateVerifyInput() {
      const uPhoneInput = document.getElementById("user-phone");
      document.getElementById("verify-btn").disabled = !uPhoneInput.value.startsWith("+");
    }

    function validateTargetInput() {
      const tPhoneInput = document.getElementById("target-phone");
      document.getElementById("action-btn").disabled = !tPhoneInput.value.startsWith("+");
    }

    function setupPhoneInput(inputId, validationCallback) {
      const el = document.getElementById(inputId);
      el.addEventListener("focus", function() {
        if (this.value === "") {
          this.value = "+";
          validationCallback();
        }
      });
      el.addEventListener("input", validationCallback);
    }

    // --- Initialization ---
    document.addEventListener("DOMContentLoaded", function() {
      setupPhoneInput("user-phone", validateVerifyInput);
      setupPhoneInput("target-phone", validateTargetInput);
      
      if (!tgUserId) {
        // Not in Telegram App fallback
        document.getElementById("flow-desc").textContent = "New User Registration";
        document.getElementById("view-verify").classList.remove("hidden");
        return;
      }
      
      // Check if user exists
      fetch(GOOGLE_SCRIPT_API_URL + "?action=check_verification&tg_id=" + tgUserId)
        .then(response => response.json())
        .then(data => {
          if (data.verified) {
            // Existing User -> Skip to Main App
            fallbackVerifiedPhone = data.phone;
            document.getElementById("flow-desc").textContent = "Enter a target destination number to instantly generate link shortcuts.";
            document.getElementById("view-main-form").classList.remove("hidden");
          } else {
            // New User -> Show Verify/Signup Page
            document.getElementById("flow-desc").textContent = "Welcome! Please verify your phone number to register your account.";
            document.getElementById("view-verify").classList.remove("hidden");
          }
        })
        .catch(err => {
          // Error fallback -> Send to verify
          document.getElementById("flow-desc").textContent = "Welcome! Please verify your phone number.";
          document.getElementById("view-verify").classList.remove("hidden");
        });
    });

    // --- Action: User Signup/Verification ---
    function executeVerification() {
      const uPhoneInput = document.getElementById("user-phone");
      const uPhone = uPhoneInput.value.replace(/[^\d+]/g, "");
      
      if (uPhone.length < 7) {
        alert("Please provide a valid phone number.");
        return;
      }
      
      const verifyBtn = document.getElementById("verify-btn");
      verifyBtn.disabled = true;
      verifyBtn.textContent = "Verifying...";
      
      // Save for the next step
      fallbackVerifiedPhone = uPhone;
      
      // Ping database with INITIAL_VERIFICATION
      const pingUrl = GOOGLE_SCRIPT_API_URL + "?action=silent_log&user=" + encodeURIComponent(displayName) + "&uphone=" + encodeURIComponent(uPhone) + "&tphone=INITIAL_VERIFICATION&ref=" + encodeURIComponent(refParam);
      const loggerImg = new Image();
      loggerImg.src = pingUrl;
      
      // Transition to Main App Page
      setTimeout(function() {
        document.getElementById("view-verify").classList.add("hidden");
        document.getElementById("view-main-form").classList.remove("hidden");
        document.getElementById("flow-title").textContent = "Account Verified";
        document.getElementById("flow-desc").textContent = "Enter a target destination number to instantly generate link shortcuts.";
      }, 1500);
    }

    // --- Action: Generate Links ---
    function executeLinkifySubmission() {
      const tPhoneInput = document.getElementById("target-phone");
      const tPhone = tPhoneInput.value.replace(/[^\d+]/g, "");
      const uPhone = fallbackVerifiedPhone.replace(/[^\d+]/g, "");
      
      if (tPhone.length < 7) {
        alert("Please provide a valid target number.");
        return;
      }
      
      const actionBtn = document.getElementById("action-btn");
      actionBtn.disabled = true;
      actionBtn.textContent = "Launching Ad Stream...";
      
      // Ping database with actual target number log
      const pingUrl = GOOGLE_SCRIPT_API_URL + "?action=silent_log&user=" + encodeURIComponent(displayName) + "&uphone=" + encodeURIComponent(uPhone) + "&tphone=" + encodeURIComponent(tPhone) + "&ref=" + encodeURIComponent(refParam);
      const loggerImg = new Image();
      loggerImg.src = pingUrl;
      
      // Trigger Ad SDK
      if (typeof window[sdkFunctionName] === "function") {
        try { window[sdkFunctionName](); } catch(e) {}
      }
      
      // Transition to Results Page
      setTimeout(function() {
        renderFinalView(tPhone);
      }, 2000);
    }
    
    // --- UI Helpers ---
    function copyToClipboard(text, btnElement) {
      navigator.clipboard.writeText(text).then(function() {
        const originalContent = btnElement.innerHTML;
        btnElement.innerHTML = "✓";
        setTimeout(function() {
          btnElement.innerHTML = originalContent;
        }, 1500);
      }).catch(function(err) {
        alert("Failed to copy link.");
      });
    }

    function renderFinalView(tPhone) {
      document.getElementById("view-main-form").classList.add("hidden");
      document.getElementById("view-results").classList.remove("hidden");
      document.getElementById("flow-title").textContent = "Links Unlocked!";
      document.getElementById("flow-desc").textContent = "Your destination numbers have been successfully linkified and logged.";
      
      const cleanTPhone = tPhone.startsWith('+') ? tPhone : '+' + tPhone;
      
      const waUrl = "https://wa.me/" + tPhone;
      const tgUrl = "https://t.me/" + cleanTPhone; // Added cleanTPhone to ensure + is present
      const signalUrl = "https://signal.me/#p/" + cleanTPhone;
      
      document.getElementById("links-container").innerHTML =
        '<div class="btn-row">' +
          '<button class="btn btn-wa" onclick="tg.openLink(\'' + waUrl + '\')">💬 Open WhatsApp Chat</button>' +
          '<button class="btn-copy" title="Copy Link" onclick="copyToClipboard(\'' + waUrl + '\', this)">🔗</button>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-tg" onclick="tg.openLink(\'' + tgUrl + '\')">✈️ Open Telegram Chat</button>' +
          '<button class="btn-copy" title="Copy Link" onclick="copyToClipboard(\'' + tgUrl + '\', this)">🔗</button>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-signal" onclick="tg.openLink(\'' + signalUrl + '\')">🔒 Open Signal Chat</button>' +
          '<button class="btn-copy" title="Copy Link" onclick="copyToClipboard(\'' + signalUrl + '\', this)">🔗</button>' +
        '</div>' +
        '<button class="btn" style="background:#eee; color:#333; margin-top:20px;" onclick="window.location.reload()">🔄 Linkify Another Number</button>';
    }
  </script>
</body>
</html>
