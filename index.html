<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuickLinkify Engine</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- NATIVE LIVE MONETAG SDK TAG -->
  <script src="https://libtl.com/sdk.js" data-zone="11216586" data-sdk="show_11216586"></script>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background-color: var(--tg-theme-bg-color, #f5f7fb); color: var(--tg-theme-text-color, #333333); padding: 25px 15px; margin: 0; }
    .card { background: var(--tg-theme-secondary-bg-color, #ffffff); max-width: 400px; margin: 0 auto; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
    .btn { display: inline-block; width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; font-weight: bold; border: none; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
    .btn:active { opacity: 0.8; }
    .btn:disabled { background-color: #cccccc !important; color: #888888 !important; cursor: not-allowed; opacity: 1; }
    .btn-primary { background-color: var(--tg-theme-button-color, #0088cc); color: var(--tg-theme-button-text-color, #ffffff); }
    .btn-wa { background-color: #25D366; color: white; }
    .btn-tg { background-color: #26A5E4; color: white; }
    
    /* Input field wrapper system to isolate the forced visual '+' layout safely */
    .input-wrapper { position: relative; margin-top: 15px; text-align: left; }
    .input-wrapper::before { content: "+"; position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--tg-theme-text-color, #333); font-weight: bold; z-index: 2; pointer-events: none; }
    .input-field { width: 100%; padding: 14px 14px 14px 32px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; background: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #333); outline: none; transition: border-color 0.2s, box-shadow 0.2s; position: relative; z-index: 1; }
    
    /* Validation failure states */
    .input-invalid { border: 1px solid #e74c3c !important; box-shadow: 0 0 0 2px rgba(231, 76, 60, 0.2); }
    .hidden { display: none !important; }
    .description-text { color: #666666; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
    
    .btn-row { display: flex; align-items: center; gap: 8px; margin-top: 15px; }
    .btn-row .btn { margin-top: 0; flex-grow: 1; }
    .btn-copy { background: var(--tg-theme-bg-color, #eeeeee); color: var(--tg-theme-text-color, #333333); border: 1px solid #ccc; border-radius: 8px; height: 48px; width: 48px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-sizing: border-box; flex-shrink: 0; transition: background 0.2s; }
    .btn-copy:active { background: #ddd; }
  </style>
</head>
<body>
  <div class="card">
    <h3 id="flow-title">QuickLinkify</h3>
    <p class="description-text" id="flow-desc">Verifying status tracking registry...</p>
    
    <div id="view-main-form" class="hidden">
      <div class="input-wrapper" id="user-phone-wrapper">
        <input type="tel" id="user-phone" class="input-field" placeholder="Your Phone Number" oninput="validateFormInputs()">
      </div>
      <div class="input-wrapper">
        <input type="tel" id="target-phone" class="input-field" placeholder="Target Number to Linkify" oninput="validateFormInputs()">
      </div>
      <button class="btn btn-primary" id="action-btn" onclick="executeLinkifySubmission()" disabled>Generate & Log Links</button>
    </div>
    
    <div id="view-results" class="hidden">
      <div id="links-container"></div>
    </div>
  </div>
  
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const sdkFunctionName = "show_11216586";
    let isUserAlreadyVerified = false;
    let fallbackVerifiedPhone = "";
    
    // ⚠️ CONFIGURATION: Paste your Google Apps Script Web App Executable URL here!
    const GOOGLE_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbwh8ZEuboFIt56bue7ShUEZBxmkBLMgoqBioZJ2tMtPIcfZYKhbUgUUQlGgdsCKvoVP2Q/exec";
    
    document.addEventListener("DOMContentLoaded", function() {
      const userObj = tg.initDataUnsafe.user;
      const tgUserId = userObj ? userObj.id : "";
      
      if (!tgUserId) {
        document.getElementById("view-main-form").classList.remove("hidden");
        document.getElementById("flow-desc").textContent = "Please complete parameters below.";
        validateFormInputs();
        return;
      }
      
      fetch(GOOGLE_SCRIPT_API_URL + "?action=check_verification&tg_id=" + tgUserId)
        .then(response => response.json())
        .then(data => {
          document.getElementById("view-main-form").classList.remove("hidden");
          if (data.verified) {
            isUserAlreadyVerified = true;
            fallbackVerifiedPhone = data.phone;
            document.getElementById("user-phone-wrapper").classList.add("hidden");
            document.getElementById("flow-desc").textContent = "Enter a target destination number to instantly generate link shortcuts.";
          } else {
            document.getElementById("flow-desc").textContent = "New User! Please verify your number properties to initiate enrollment layout.";
            document.getElementById("action-btn").textContent = "Verify & Linkify Number";
          }
          validateFormInputs();
        })
        .catch(err => {
          document.getElementById("view-main-form").classList.remove("hidden");
          document.getElementById("flow-desc").textContent = "Please complete parameters below.";
          validateFormInputs();
        });
    });

    function validateFormInputs() {
      const uPhoneInput = document.getElementById("user-phone");
      const tPhoneInput = document.getElementById("target-phone");
      const actionBtn = document.getElementById("action-btn");
      
      let isFormValid = true;
      
      // 1. Target Phone Validation (Always visible)
      const tValue = tPhoneInput.value.trim();
      // Ensure digits are present and it does not contain a raw manual '+' sign typed inside the box
      if (tValue.length < 7 || tValue.includes("+")) {
        tPhoneInput.classList.add("input-invalid");
        isFormValid = false;
      } else {
        tPhoneInput.classList.remove("input-invalid");
      }
      
      // 2. User Phone Validation (Only evaluated if the user is unverified)
      if (!isUserAlreadyVerified) {
        const uValue = uPhoneInput.value.trim();
        if (uValue.length < 7 || uValue.includes("+")) {
          uPhoneInput.classList.add("input-invalid");
          isFormValid = false;
        } else {
          uPhoneInput.classList.remove("input-invalid");
        }
      }
      
      // Toggle button execution capability dynamically
      actionBtn.disabled = !isFormValid;
    }

    function executeLinkifySubmission() {
      const uPhoneInput = document.getElementById("user-phone");
      const tPhoneInput = document.getElementById("target-phone");
      
      // Automatically clean numerical strings and prepend the forced tracking plus symbol safely
      let rawTPhone = tPhoneInput.value.replace(/\D/g, "");
      let rawUPhone = isUserAlreadyVerified ? String(fallbackVerifiedPhone).replace(/\D/g, "") : uPhoneInput.value.replace(/\D/g, "");
      
      const tPhoneWithPlus = "+" + rawTPhone;
      const uPhoneWithPlus = "+" + rawUPhone;
      
      const actionBtn = document.getElementById("action-btn");
      actionBtn.disabled = true;
      actionBtn.textContent = "Launching Ad Stream...";
      
      const userObj = tg.initDataUnsafe.user;
      const displayName = userObj ? "[" + userObj.id + "] " + (userObj.first_name || "") + " " + (userObj.last_name || "") + " (@" + (userObj.username || "") + ")" : "Unknown App User";
      
      const actualDestinationParam = isUserAlreadyVerified ? tPhoneWithPlus : "INITIAL_VERIFICATION";
      
      const pingUrl = GOOGLE_SCRIPT_API_URL + "?action=silent_log&user=" + encodeURIComponent(displayName) + "&uphone=" + encodeURIComponent(uPhoneWithPlus) + "&tphone=" + encodeURIComponent(actualDestinationParam);
      const loggerImg = new Image();
      loggerImg.src = pingUrl;
      
      if (typeof window[sdkFunctionName] === "function") {
        try {
          window[sdkFunctionName]();
        } catch(e) { console.log("Ad script execution error: " + e.toString()); }
      }
      
      setTimeout(function() {
        const outputTarget = isUserAlreadyVerified ? rawTPhone : rawUPhone;
        renderFinalView(outputTarget);
      }, 2000);
    }
    
    function copyToClipboard(text, btnElement) {
      navigator.clipboard.writeText(text).then(function() {
        const originalContent = btnElement.innerHTML;
        btnElement.innerHTML = "✓";
        setTimeout(function() {
          btnElement.innerHTML = originalContent;
        }, 1500);
      }).catch(function(err) {
        alert("Failed to copy link.");
      });
    }

    function renderFinalView(tPhoneDigits) {
      document.getElementById("view-main-form").classList.add("hidden");
      document.getElementById("view-results").classList.remove("hidden");
      document.getElementById("flow-title").textContent = "Links Unlocked!";
      document.getElementById("flow-desc").textContent = "Your destination numbers have been successfully linkified and logged.";
      
      // Keep the '+' intact for the actual launch shortcuts out of the Web App frame context
      const waUrl = "https://wa.me/" + tPhoneDigits;
      const tgUrl = "https://t.me/+" + tPhoneDigits; 
      
      document.getElementById("links-container").innerHTML =
        '<div class="btn-row">' +
          '<button class="btn btn-wa" onclick="tg.openLink(\'' + waUrl + '\')">💬 Open WhatsApp Chat</button>' +
          '<button class="btn-copy" title="Copy Link" onclick="copyToClipboard(\'' + waUrl + '\', this)">🔗</button>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-tg" onclick="tg.openLink(\'' + tgUrl + '\')">✈️ Open Telegram Chat</button>' +
          '<button class="btn-copy" title="Copy Link" onclick="copyToClipboard(\'' + tgUrl + '\', this)">🔗</button>' +
        '</div>' +
        '<button class="btn" style="background:#eee; color:#333; margin-top:20px;" onclick="window.location.reload()">🔄 Linkify Another Number</button>';
    }
  </script>
</body>
</html>
